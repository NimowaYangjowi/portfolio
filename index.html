<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="고객의 업무 문제를 기술 요구사항과 제품 시스템으로 바꾸는 한지우의 포트폴리오"
    />
    <title>한지우 | Jiwoo Han</title>
    <script>
      (() => {
        const basePath = new URL('%BASE_URL%', window.location.origin).pathname;
        const baseWithSlash = basePath.endsWith('/') ? basePath : `${basePath}/`;
        const pathWithSlash = window.location.pathname.endsWith('/')
          ? window.location.pathname
          : `${window.location.pathname}/`;

        if (pathWithSlash === baseWithSlash) {
          window.location.replace(
            `${baseWithSlash}ko${window.location.search}${window.location.hash}`,
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
